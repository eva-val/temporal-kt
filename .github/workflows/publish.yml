name: Publish to Maven Central

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/buildtest.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use gradle.properties version)'
        required: false
        type: string

# Cancel in-progress runs for the same branch (but not for releases)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Build per-classifier JARs via Nix.
  # The Linux runner cross-compiles 3 targets (x86_64-gnu, aarch64-gnu, windows-mingw) in a single job.
  # The macOS runner builds the Darwin target only — the flake doesn't cross-from-Darwin.
  build-native:
    name: Build Native (${{ matrix.host }})
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            host: linux
            classifiers: linux-x86_64-gnu linux-aarch64-gnu windows-x86_64
          - os: macos-14
            host: macos
            classifiers: macos-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: temporal-kt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build classifier JARs via Nix
        run: |
          mkdir -p staging
          for c in ${{ matrix.classifiers }}; do
            echo "::group::nix build .#core-bridge-jar-$c"
            nix build ".#core-bridge-jar-$c" --print-build-logs --out-link "result-$c"
            cp -L "result-$c/core-bridge-$c.jar" "staging/core-bridge-$c.jar"
            echo "::endgroup::"
          done
          ls -lah staging/

      - name: Upload classifier JARs
        uses: actions/upload-artifact@v4
        with:
          name: native-jars-${{ matrix.host }}
          path: staging/core-bridge-*.jar
          retention-days: 1
          if-no-files-found: error

  # Run the JVM build/tests on each runtime architecture, consuming the pre-built classifier JAR
  # via the -PcoreBridgeJar.<classifier>=<path> injection point. No Nix needed at this stage.
  test:
    name: Test (${{ matrix.platform }})
    needs: [build-native]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64-gnu
            host: linux
          - os: ubuntu-24.04-arm
            platform: linux-aarch64-gnu
            host: linux
          - os: macos-14
            platform: macos-aarch64
            host: macos
          # These machines are really jank with github, revisit in future when microsoft fixes it maybe.
          # - os: windows-latest
          #   platform: windows-x86_64
          #   host: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download host native JARs
        uses: actions/download-artifact@v4
        with:
          name: native-jars-${{ matrix.host }}
          path: native-jars

      - name: Build and test
        run: |
          ./gradlew build \
            "-PcoreBridgeJar.${{ matrix.platform }}=$PWD/native-jars/core-bridge-${{ matrix.platform }}.jar" \
            -PexcludeTags=githubactionrunnersarebadmicrosoftshouldfixit \
            --no-daemon

  # Pull both host artifacts (4 classifier JARs total), publish to Maven Central, and on release
  # events upload renamed JARs to the GitHub Release.
  publish:
    name: Publish to Maven Central
    needs: [build-native, test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for release asset uploads
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Linux native JARs
        uses: actions/download-artifact@v4
        with:
          name: native-jars-linux
          path: native-jars

      - name: Download macOS native JARs
        uses: actions/download-artifact@v4
        with:
          name: native-jars-macos
          path: native-jars

      - name: Verify native JARs
        run: |
          echo "Downloaded native JARs:"
          ls -lah native-jars/
          for c in linux-x86_64-gnu linux-aarch64-gnu macos-aarch64 windows-x86_64; do
            jar="native-jars/core-bridge-$c.jar"
            if [ ! -f "$jar" ]; then
              echo "ERROR: missing $jar"
              exit 1
            fi
            echo "--- $jar (top entries) ---"
            jar tf "$jar" | head
          done

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Publishing version: $VERSION"
          sed -i "s/version=.*/version=$VERSION/" gradle.properties

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          echo "Publishing version: ${{ inputs.version }}"
          sed -i "s/version=.*/version=${{ inputs.version }}/" gradle.properties

      - name: Publish to Maven Central
        run: |
          ./gradlew publishToMavenCentral \
            "-PcoreBridgeJar.linux-x86_64-gnu=$PWD/native-jars/core-bridge-linux-x86_64-gnu.jar" \
            "-PcoreBridgeJar.linux-aarch64-gnu=$PWD/native-jars/core-bridge-linux-aarch64-gnu.jar" \
            "-PcoreBridgeJar.macos-aarch64=$PWD/native-jars/core-bridge-macos-aarch64.jar" \
            "-PcoreBridgeJar.windows-x86_64=$PWD/native-jars/core-bridge-windows-x86_64.jar" \
            -PsigningInMemoryKey="${{ secrets.SIGNING_KEY }}" \
            -PsigningInMemoryKeyPassword="${{ secrets.SIGNING_PASSWORD }}" \
            -PmavenCentralUsername="${{ secrets.OSSRH_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.OSSRH_TOKEN }}" \
            --no-configuration-cache --no-daemon

      - name: Stage classifier JARs for release upload
        if: github.event_name == 'release'
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          echo "Staging version: $VERSION"
          mkdir -p release-assets
          for c in linux-x86_64-gnu linux-aarch64-gnu macos-aarch64 windows-x86_64; do
            cp "native-jars/core-bridge-$c.jar" "release-assets/core-bridge-$VERSION-$c.jar"
          done
          ls -lah release-assets/

      - name: Upload artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            core-bridge/build/libs/*.jar
            core/build/libs/*.jar
            core-testing/build/libs/*.jar
            compiler-plugin/build/libs/*.jar
            gradle-plugin/build/libs/*.jar
            plugins/di/build/libs/*.jar
            plugins/opentelemetry/build/libs/*.jar
            release-assets/*.jar
