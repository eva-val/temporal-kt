name: CI Build

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        with:
          name: temporal-kt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Verify sdk-core submodule matches flake input
        run: |
          submodule_rev=$(git submodule status core-bridge/rust/sdk-core | awk '{print $1}' | tr -d '+-')
          flake_rev=$(nix flake metadata --json | jq -r '.locks.nodes."sdk-core".locked.rev')
          if [ "$submodule_rev" != "$flake_rev" ]; then
            echo "::error::sdk-core submodule rev ($submodule_rev) does not match flake.lock ($flake_rev)."
            echo "Run: nix flake update sdk-core   (after git submodule update --remote)"
            exit 1
          fi
          echo "sdk-core rev matches: $submodule_rev"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build -PexcludeTags=githubactionrunnersarebadmicrosoftshouldfixit --no-daemon
